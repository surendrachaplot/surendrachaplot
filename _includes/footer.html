<footer class="site-footer">
  <div class="wrap">
    <div class="site-footer__grid">
      <div class="site-footer__col">
        <h5>{{ site.title }}</h5>
      </div>
      <div class="site-footer__col">
        <h5>Read</h5>
        <ul>
          {%- for item in site.nav_links -%}
            <li><a href="{{ item.url | relative_url }}">{{ item.title }}</a></li>
          {%- endfor -%}
        </ul>
      </div>
      <div class="site-footer__col">
        <h5>Elsewhere</h5>
        <ul>
          {%- for s in site.social -%}
            <li><a href="{{ s.url }}">{{ s.label }}</a></li>
          {%- endfor -%}
        </ul>
      </div>
    </div>
    <div class="site-footer__bottom">
      <span>© {{ site.established }}–{{ 'now' | date: "%Y" }} · {{ site.title }}</span>
      <span>Freedom for Palestine 🇵🇸 · Made slowly</span>
    </div>
  </div>
</footer>
