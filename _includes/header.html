<header class="site-header">
  <div class="wrap site-header__inner">
    <a class="wordmark" href="{{ '/' | relative_url }}">
      {{ site.title }}<span class="dot">.</span>
    </a>
    <nav class="site-nav">
      {%- for item in site.nav_links -%}
        <a href="{{ item.url | relative_url }}" {% if page.url contains item.url and item.url != "/" %}class="is-active"{% endif %}>{{ item.title }}</a>
      {%- endfor -%}
    </nav>
    <span class="site-status">Currently · {{ site.currently }}</span>
  </div>
</header>
