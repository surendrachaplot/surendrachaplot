title: "Surendra Chaplot"
tagline: "A jack of a few things, made slowly."
description: "Writing, photographs from the road, and notes from a working life."
author: "Surendra Chaplot"
email: ""
url: "https://surendrachaplot.github.io"
baseurl: ""

# Navigation
nav_links:
  - { title: "Writing",      url: "/posts/" }
  - { title: "Photographs",  url: "/photos/" }
  - { title: "Books",        url: "/books/" }
  - { title: "About",        url: "/about/" }

# Social
social:
  - { label: "Instagram", url: "https://instagram.com/chaplot" }
  - { label: "Goodreads", url: "https://www.goodreads.com/chaplot" }
  - { label: "RSS",       url: "/feed.xml" }

# Footer
currently: "London"
established: 2009

# Build
markdown: kramdown
highlighter: rouge
permalink: /writing/:slug/

plugins:
  - jekyll-feed
  - jekyll-seo-tag

defaults:
  - scope: { path: "", type: "posts" }
    values:
      layout: post
  - scope: { path: "", type: "pages" }
    values:
      layout: page

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - .bundle
  - README.md

kramdown:
  input: GFM
  hard_wrap: false
