---
layout: default
---
<div class="wrap" style="padding-top: 96px;">
  <h1 style="margin-top: 0;">{{ page.title }}</h1>
  {% if page.lede %}<p style="font-family: var(--font-serif, serif); font-style: italic; font-size: 20px; line-height: 1.5; color: #283027; max-width: 56ch;">{{ page.lede }}</p>{% endif %}

  <div class="posts-list" style="margin-top: 48px;">
    {%- for post in site.posts -%}
      {% include post-card.html post=post %}
    {%- endfor -%}
  </div>
</div>
