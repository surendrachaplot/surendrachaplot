---
layout: default
---
<div class="wrap wrap--text" style="padding-top: {% if page.hide_title %}40px{% else %}72px{% endif %};">

  {% unless page.hide_title %}
  <span class="eyebrow">{{ page.kicker | default: "Page" }}</span>
  <h1 style="margin-top: 16px;">{{ page.title }}</h1>
  {% endunless %}
  {% if page.lede %}<h3 style="margin-top: 16px; margin-bottom: 0;">{{ page.lede }}</h3>{% endif %}

  <div class="prose" style="margin-top: 32px;">
    {{ content }}
  </div>
</div>
