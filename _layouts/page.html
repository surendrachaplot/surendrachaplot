---
layout: default
---
<div class="wrap wrap--text" style="padding-top: 96px;">
  {% unless page.hide_title %}
  <span class="eyebrow">{{ page.kicker | default: "Page" }}</span>
  <h1 style="margin-top: 16px;">{{ page.title }}</h1>
  {% endunless %}
  {% if page.lede %}<p class="prose" style="margin-top: 0; font-size: 18px;">{{ page.lede }}</p>{% endif %}

  <div class="prose" style="margin-top: 48px;">
    {{ content }}
  </div>
</div>
